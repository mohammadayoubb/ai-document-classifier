[alembic]
# This tells Alembic where the migration environment lives.
script_location = app/db/migrations

# This value can be overwritten inside env.py using DATABASE_URL.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/docclassifier

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s