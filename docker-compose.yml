services:
  api:
    build:
      context: .
      target: api
    ports: ["${API_PORT:-8000}:8000"]
    env_file: .env
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=docclassifier
      - POSTGRES_USER=postgres
      - POSTGRES_VAULT_PATH=app
      - POSTGRES_VAULT_KEY=postgres_password
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      migrate: { condition: service_completed_successfully }
      vault-init: { condition: service_completed_successfully }
      vault: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    # rq worker reads RQ_REDIS_URL from the environment; --url is explicit fallback.
    command: rq worker --url ${REDIS_URL:-redis://redis:6379}
    env_file: .env
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=docclassifier
      - POSTGRES_USER=postgres
      - POSTGRES_VAULT_PATH=app
      - POSTGRES_VAULT_KEY=postgres_password
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      migrate: { condition: service_completed_successfully }
      vault-init: { condition: service_completed_successfully }
      minio-init: { condition: service_completed_successfully }
    networks: [app-net]

  sftp-ingest:
    build:
      context: .
      target: sftp-ingest
    env_file: .env
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
      - SFTP_HOST=sftp
      - SFTP_PORT=22
      - SFTP_USER=uploader
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=docclassifier
      - POSTGRES_USER=postgres
      - POSTGRES_VAULT_PATH=app
      - POSTGRES_VAULT_KEY=postgres_password
    depends_on:
      sftp: { condition: service_started }
      minio-init: { condition: service_completed_successfully }
      vault-init: { condition: service_completed_successfully }
      migrate: { condition: service_completed_successfully }
    networks: [app-net]

  # Seeds Vault KV v2 with application secrets before any app container starts.
  # Runs once and exits; api, worker, and migrate wait for it to complete.
  vault-init:
    build:
      context: .
      target: migrate
    command: python scripts/vault_seed.py
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
    depends_on:
      vault: { condition: service_healthy }
    networks: [app-net]

  # Creates the MinIO buckets (documents + overlays) before workers start.
  # Runs once and exits; worker and sftp-ingest wait for it to complete.
  minio-init:
    build:
      context: .
      target: migrate
    command: python scripts/minio_init.py
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      minio: { condition: service_healthy }
    networks: [app-net]

  migrate:
    build:
      context: .
      target: migrate
    # Run migrations then seed Casbin policies in one step.
    command: >
      sh -c "alembic upgrade head && python scripts/casbin_seed.py"
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=docclassifier
      - POSTGRES_USER=postgres
      - POSTGRES_VAULT_PATH=app
      - POSTGRES_VAULT_KEY=postgres_password
      # Direct URL used by alembic env.py and casbin_seed.py inside the container.
      # Password matches POSTGRES_PASSWORD in .env and vault_seed.py postgres_password.
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/docclassifier
    depends_on:
      db: { condition: service_healthy }
      vault-init: { condition: service_completed_successfully }
    networks: [app-net]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: docclassifier
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD to match Vault postgres_password}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [app-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes: [minio_data:/data]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 10

  sftp:
    image: atmoz/sftp
    ports: ["${SFTP_PORT:-2222}:22"]
    volumes: [sftp_uploads:/home/uploader/uploads]
    # uid:gid 1000:100 matches the uploader user inside the container so the
    # named volume is writable without a post-start chmod
    command: uploader:password:1000:100:uploads
    networks: [app-net]

  vault:
    image: hashicorp/vault:1.16
    ports: ["${VAULT_PORT:-8200}:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add: [IPC_LOCK]
    networks: [app-net]
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    ports: ["${FRONTEND_PORT:-5173}:5173"]
    depends_on:
      api: { condition: service_healthy }
    networks: [app-net]

networks:
  app-net:

volumes:
  postgres_data:
  minio_data:
  sftp_uploads:
